<div class="container">
    <div class="row mt-5 mb-3 align-items-center">
        <div class="col-md-8">
            <h3 class="mb-0">Estado fitosanitario</h3>
        </div>
        <div class="col-md-4 text-end">
            <app-fecha></app-fecha>
        </div>
    </div>
    <hr />

    <app-estado-actual-fitosanitario
        [cards]="estadoActualCards"
        [lotes]="lotesErradicaciones"
        [loteSeleccionado]="loteErradicacionesSeleccionado"
        [activePalms]="activePalms"
        (loteSeleccionadoChange)="aplicarFiltroLote($event)"
    ></app-estado-actual-fitosanitario>

    <app-vista-mensual-fitosanitario
        [cards]="vistaMensualCards"
        [fechaSeleccionada]="fechaSeleccionada"
        [enfermedadSeleccionada]="enfermedadSeleccionada"
        [enfermedades]="enfermedades"
        [estadoCargaMensaje]="estadoCargaMensaje"
        [chartLabels]="monthlyChartLabels"
        [chartData]="monthlyChartData"
        [incidenciasMensuales]="incidenciasMensuales"
        (fechaSeleccionadaChange)="fechaSeleccionada = $event"
        (enfermedadSeleccionadaChange)="enfermedadSeleccionada = $event"
        (consultar)="cambiarChart()"
        (generarPdf)="crearPdf()"
    ></app-vista-mensual-fitosanitario>
</div>
